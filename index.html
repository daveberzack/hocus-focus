<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link type="text/css" rel="stylesheet" href="styles.css" />
  <meta content='width=device-width; initial-scale=1.0; maximum-scale=1.0; user-scalable=0;' name='viewport' />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Signika+Negative:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>
  <header>
    <h1 id="logo">Hocus Focus v1.04</h1>
    <a id="help-link" href="#">?</a>
  </header>
  <h2 id="clue"> </h2>
  <div id="timer">
    <div id="timer-label">0</div>
  </div>
  <div id="game">
    <canvas width="512" height="512" id="paint0"></canvas>
    <canvas width="512" height="512" id="paint1"></canvas>
    <canvas width="512" height="512" id="paint2"></canvas>
    <canvas width="512" height="512" id="paint3"></canvas>
    <canvas width="512" height="512" id="paint4"></canvas>
    <canvas width="512" height="512" id="paint5"></canvas>
    <canvas width="512" height="512" id="paint6"></canvas>
    <canvas width="512" height="512" id="paint7"></canvas>
    <canvas width="512" height="512" id="pic"></canvas>
    <canvas width="512" height="512" id="hit"></canvas>
  </div>

  <a id="reset" href="#">Reset</a>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"
    integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
  <script type="text/javascript" src="scripts/pixel.js"></script>
  <script type="text/javascript" src="scripts/game.js"></script>

</body>

</html>
